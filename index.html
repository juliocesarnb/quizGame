<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Um Quiz Sobre Nós ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Parisienne&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hearts-bg" id="heartsBg" aria-hidden="true"></div>

  <button id="musicToggle" class="music-toggle hidden" aria-label="Ativar ou desativar música">🔊</button>

  <main class="app">
    <section id="startScreen" class="card screen active">
      <h1>Um Quiz Sobre Nós ❤️</h1>
      <p class="subtitle">Vamos ver se você lembra desses momentos?</p>
      <img class="hero-image" src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=800&q=80" alt="Casal em momento romântico" />
      <button id="startBtn" class="btn btn-primary">Começar o Quiz</button>
    </section>

    <section id="quizScreen" class="card screen hidden">
      <p id="progress" class="progress">Pergunta 1 de 5</p>
      <h2 id="questionText" class="question-text"></h2>
      <img id="questionImage" class="question-image" src="" alt="Foto da pergunta" />
      <div id="optionsContainer" class="options"></div>
    </section>

    <section id="resultScreen" class="card screen hidden">
      <div class="flower-pop" aria-hidden="true">🌹</div>
      <h2 id="scoreText" class="result-title"></h2>
      <p id="finalMessage" class="final-message"></p>
      <p class="final-message second">Agora vem buscar sua flor de verdade comigo.</p>

      <button id="secretBtn" class="btn btn-secondary">Mensagem secreta</button>
      <p id="secretMessage" class="secret-message hidden"></p>

      <h3 class="gallery-title">Nossos momentos</h3>
      <div id="galleryGrid" class="gallery-grid"></div>
    </section>
  </main>

  <div id="lightbox" class="lightbox hidden">
    <button id="lightboxClose" class="lightbox-close" aria-label="Fechar imagem">✕</button>
    <img id="lightboxImage" src="" alt="Foto ampliada" />
  </div>

  <audio id="bgMusic" loop preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
